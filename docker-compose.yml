services:

  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ems_dashboard}
      POSTGRES_USER: ${POSTGRES_USER:-ems}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ems_secure_2026}
    ports:
      - "5432:5432"
    volumes:
      - ./.postgres-data:/var/lib/postgresql/data
      - ./server/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ems} -d ${POSTGRES_DB:-ems_dashboard}"]
      interval: 10s
      timeout: 5s
      retries: 5

  node-red:
    build:
      context: .
      dockerfile: Dockerfile.nodered
    restart: unless-stopped
    ports:
      - "1880:1880"
    volumes:
      - ./node-red:/data
    environment:
      TZ: Africa/Dar_es_Salaam
      NODE_RED_CREDENTIAL_SECRET: ${NODE_RED_SECRET:-ems_nodered_secret_2026}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-ems_dashboard}
      POSTGRES_USER: ${POSTGRES_USER:-ems}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ems_secure_2026}
      MQTT_BROKER_HOST: mosquitto
      MQTT_BROKER_PORT: 1883
    depends_on:
      db:
        condition: service_healthy
      mosquitto:
        condition: service_started

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    environment:
      PORT: ${PORT:-3001}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-ems_dashboard}
      POSTGRES_USER: ${POSTGRES_USER:-ems}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ems_secure_2026}
      MQTT_BROKER: ${MQTT_BROKER:-mqtt://mosquitto:1883}
      JWT_SECRET: ${JWT_SECRET:-ems_jwt_secret_change_in_production}
      ENABLE_SIMULATOR: ${ENABLE_SIMULATOR:-false}
      TZ: Africa/Dar_es_Salaam
    depends_on:
      db:
        condition: service_healthy
      mosquitto:
        condition: service_started
