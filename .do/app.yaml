name: bank-server-room-ems
region: fra

services:
  - name: web
    run_command: node server/index.js
    environment_slug: node-js
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb   # $5 / month

    github:
      repo: technicalbitlynx-web/EMS-DASHBOARD
      branch: master
      deploy_on_push: true

    http_port: 3001

    health_check:
      http_path: /api/health
      initial_delay_seconds: 10
      period_seconds: 30

    envs:
      - key: NODE_ENV
        value: production
        scope: RUN_TIME

      - key: DATABASE_URL
        value: ""          # ← paste your Supabase pooler connection string (without password)
        scope: RUN_TIME

      - key: DATABASE_PASSWORD
        value: ""          # ← paste your Supabase database password (mark as Secret)
        scope: RUN_TIME
        type: SECRET

      - key: JWT_SECRET
        value: ""          # ← paste a long random string in App Platform dashboard (mark as Secret)
        scope: RUN_TIME
        type: SECRET

      - key: ENABLE_SIMULATOR
        value: "true"
        scope: RUN_TIME

      - key: MQTT_BROKER
        value: ""          # leave blank — no MQTT broker in cloud deployment
        scope: RUN_TIME
