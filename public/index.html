<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EMS Login — Bank Server Room</title>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#0f8a50"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="EMS"/>
  <link rel="apple-touch-icon" href="/icons/icon-192.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    /* ── Bitlynx EMS — Green design system (login) ─────────── */
    :root {
      --bg:       #f3f7f4;
      --card:     #ffffff;
      --border:   #dde7e0;
      --text:     #14201a;
      --sub:      #586b60;
      --primary:  #0f8a50;
      --prim-hov: #0b6f40;
      --input-bg: #eaf0ec;
      --shadow:   0 4px 16px rgba(10,19,14,.10);
      --ring:     0 0 0 3px rgba(15,138,80,.20);
      --font-sans:'IBM Plex Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    }
    [data-theme="dark"] {
      --bg:       #0a130e;
      --card:     #111b15;
      --border:   #243a2c;
      --text:     #e6f0ea;
      --sub:      #95a89d;
      --primary:  #34c07d;
      --prim-hov: #4fce92;
      --input-bg: #0c140f;
      --shadow:   0 16px 48px rgba(0,0,0,.55);
      --ring:     0 0 0 3px rgba(52,192,125,.30);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font-sans);background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;transition:background .2s,color .2s;-webkit-font-smoothing:antialiased}
    .login-wrap{width:100%;max-width:392px;padding:16px}
    .login-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:36px 32px;box-shadow:var(--shadow)}
    .brand{text-align:center;margin-bottom:26px}
    .brand-icon{width:56px;height:56px;background:var(--primary);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:24px;color:#fff}
    .brand h1{font-size:1.5rem;font-weight:700;letter-spacing:-.01em;margin-bottom:4px}
    .brand p{font-size:.8125rem;color:var(--sub)}
    .form-group{margin-bottom:14px}
    label{display:block;font-size:.6875rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase;margin-bottom:6px;color:var(--sub)}
    input{width:100%;padding:9px 12px;background:var(--input-bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--font-sans);font-size:.875rem;outline:none;transition:border .15s,box-shadow .15s}
    input:focus{border-color:var(--primary);box-shadow:var(--ring);background:var(--card)}
    .btn{width:100%;padding:11px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:.9rem;font-weight:600;font-family:var(--font-sans);cursor:pointer;transition:background .15s;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:7px}
    .btn:hover{background:var(--prim-hov)}
    .btn:disabled{opacity:.6;cursor:not-allowed}
    .error-msg{background:#fbe4e4;border:1px solid #f0b4b4;color:#b3261e;padding:10px 14px;border-radius:8px;font-size:.82rem;margin-bottom:12px;display:none}
    [data-theme="dark"] .error-msg{background:#2e0f0f;border-color:#5a2222;color:#f0a3a3}
    .history-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;justify-content:center}
    .hist-chip{padding:4px 11px;background:var(--input-bg);border:1px solid var(--border);border-radius:999px;font-size:.72rem;font-family:'IBM Plex Mono',monospace;color:var(--sub);cursor:pointer;transition:all .15s}
    .hist-chip:hover{border-color:var(--primary);color:var(--primary)}
    .divider{display:flex;align-items:center;gap:12px;margin:18px 0 8px;color:var(--sub);font-size:.6875rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
    .setup-link{text-align:center;font-size:.8125rem;color:var(--sub);margin-top:16px}
    .setup-link a{color:var(--primary);text-decoration:none;font-weight:600}
    .theme-toggle{position:fixed;top:16px;right:16px;width:36px;height:36px;background:var(--card);border:1px solid var(--border);color:var(--sub);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px}

    /* setup panel */
    .setup-panel{display:none}
    .back-link{color:var(--primary);cursor:pointer;font-size:.82rem;margin-bottom:12px;display:inline-block;font-weight:500}
  </style>
</head>
<body>
  <div class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
    <i class="fa-solid fa-circle-half-stroke"></i>
  </div>

  <div class="login-wrap">
    <div class="login-card">

      <!-- LOGIN PANEL -->
      <div id="login-panel">
        <div class="brand">
          <div class="brand-icon"><i class="fa-solid fa-server"></i></div>
          <h1>EMS Dashboard</h1>
          <p>Bank Server Room — Environmental Monitoring</p>
        </div>

        <div id="error-msg" class="error-msg"></div>

        <div class="form-group">
          <label>Username or Email</label>
          <input id="identifier" type="text" placeholder="Enter username or email" autocomplete="username"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input id="password" type="password" placeholder="Enter password" autocomplete="current-password"/>
        </div>

        <button class="btn" id="login-btn" onclick="doLogin()">
          <i class="fa-solid fa-right-to-bracket"></i>&nbsp; Sign In
        </button>

        <div id="history-section" style="margin-top:18px;display:none">
          <div class="divider">Recent logins</div>
          <div class="history-list" id="history-list"></div>
        </div>

        <div class="setup-link">
          First time? <a href="#" onclick="showSetup()">Create admin account</a>
        </div>
      </div>

      <!-- SETUP PANEL -->
      <div id="setup-panel" class="setup-panel">
        <div class="brand">
          <div class="brand-icon" style="background:#15a66b"><i class="fa-solid fa-user-shield"></i></div>
          <h1>Initial Setup</h1>
          <p>Create the first administrator account</p>
        </div>

        <span class="back-link" onclick="showLogin()">&#8592; Back to login</span>

        <div id="setup-error" class="error-msg"></div>

        <div class="form-group"><label>Full Name</label><input id="s-name" type="text" placeholder="e.g. John Doe"/></div>
        <div class="form-group"><label>Email</label><input id="s-email" type="email" placeholder="admin@bank.local"/></div>
        <div class="form-group"><label>Username</label><input id="s-username" type="text" placeholder="admin"/></div>
        <div class="form-group"><label>Password</label><input id="s-password" type="password" placeholder="Min 8 characters"/></div>

        <button class="btn" onclick="doSetup()">
          <i class="fa-solid fa-check"></i>&nbsp; Create Admin Account
        </button>
      </div>

    </div>
  </div>

  <script src="/app-api.js"></script>
  <script>
    // Theme
    const savedTheme = localStorage.getItem('ems_theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
    function toggleTheme() {
      const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', t);
      localStorage.setItem('ems_theme', t);
    }

    // Redirect if already logged in
    if (EmsApi.isLoggedIn()) window.location.href = '/dashboard.html';

    // Load recent logins
    EmsApi.loginHistory().then(hist => {
      if (!hist || !hist.length) return;
      const sec = document.getElementById('history-section');
      const list = document.getElementById('history-list');
      sec.style.display = 'block';
      hist.forEach(id => {
        const chip = document.createElement('span');
        chip.className = 'hist-chip';
        chip.textContent = id;
        chip.onclick = () => { document.getElementById('identifier').value = id; document.getElementById('password').focus(); };
        list.appendChild(chip);
      });
    }).catch(() => {});

    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg; el.style.display = 'block';
    }
    function hideError(id) { document.getElementById(id).style.display = 'none'; }

    async function doLogin() {
      hideError('error-msg');
      const id = document.getElementById('identifier').value.trim();
      const pw = document.getElementById('password').value;
      if (!id || !pw) { showError('error-msg', 'Please enter username/email and password.'); return; }
      const btn = document.getElementById('login-btn');
      btn.disabled = true; btn.textContent = 'Signing in…';
      try {
        const res = await EmsApi.login(id, pw);
        EmsApi.setSession(res.token, res.user);
        window.location.href = '/dashboard.html';
      } catch (err) {
        showError('error-msg', err.message || 'Login failed');
        btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i>&nbsp; Sign In';
      }
    }

    async function doSetup() {
      hideError('setup-error');
      const body = {
        full_name: document.getElementById('s-name').value.trim(),
        email:     document.getElementById('s-email').value.trim(),
        username:  document.getElementById('s-username').value.trim(),
        password:  document.getElementById('s-password').value,
      };
      if (!body.email || !body.username || !body.password)
        { showError('setup-error', 'All fields are required.'); return; }
      try {
        const res = await EmsApi.setup(body);
        EmsApi.setSession(res.token, res.user);
        window.location.href = '/dashboard.html';
      } catch (err) { showError('setup-error', err.message || 'Setup failed'); }
    }

    function showSetup() {
      document.getElementById('login-panel').style.display = 'none';
      document.getElementById('setup-panel').style.display = 'block';
    }
    function showLogin() {
      document.getElementById('setup-panel').style.display = 'none';
      document.getElementById('login-panel').style.display = 'block';
    }

    // Enter key triggers login
    ['identifier','password'].forEach(id => {
      document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    });

    // Register service worker for PWA / offline shell
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
